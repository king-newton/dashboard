<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>金牛頓 2026 營運分析儀表板</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; padding: 20px; background-color: #f4f4f4; color: #333; }
        .tab-content { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        /* 嚴格的表格樣式 */
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; table-layout: fixed; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; font-size: 14px; }
        .label { background-color: #f9f9f9; font-weight: bold; width: 20%; }
        .value { width: 30%; text-align: right; font-family: Consolas, monospace; }
        
        /* 客戶排名表 */
        .stat-table th { background-color: #3e5a26; color: white; }
        .stat-table td { text-align: right; }
        .stat-table td:nth-child(1), .stat-table td:nth-child(5) { text-align: center; }
        .stat-table td:nth-child(2) { text-align: left; }
        
        input { width: 95%; text-align: right; border: 1px solid #ccc; padding: 2px; }
        .footer { background: #3e5a26; color: white; padding: 15px; text-align: center; }
    </style>
</head>
<body>

    <div class="tab-content">
        <table>
            <tr>
                <td class="label">日期</td><td class="value" id="d">--</td>
                <td class="label">年度進度</td><td class="value" id="p-day">--</td>
            </tr>
            <tr>
                <td class="label">每月目標</td><td class="value"><input type="text" id="m-target" value="7,000,000" onchange="fetchCSVData()"></td>
                <td class="label">營收目標</td><td class="value" id="a-target">--</td>
            </tr>
            <tr>
                <td class="label">銷貨合計</td><td class="value" id="sales">--</td>
                <td class="label">利潤合計</td><td class="value" id="profit">--</td>
            </tr>
            <tr>
                <td class="label">營業費用</td><td class="value"><input type="text" id="expense" value="3,460,417" onchange="fetchCSVData()"></td>
                <td colspan="2"></td>
            </tr>
        </table>
        
        <div class="footer" id="summary">計算中...</div>

        <table class="stat-table">
            <thead>
                <tr><th>排名</th><th>客戶名稱</th><th>銷貨合計</th><th>利潤合計</th><th>毛利率</th></tr>
            </thead>
            <tbody id="body-rank"></tbody>
        </table>
    </div>

    <script>
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQWoViZ8oexk0ZDVaXPcbxplYRiadGzvcF0nM_dI0iSpVQUqCpgJeCFCIfWKX60De_YcN_xmkreBZUx/pub?gid=0&single=true&output=csv";
        
        function fetchCSVData() {
            Papa.parse(CSV_URL, {
                download: true, header: true,
                complete: function(res) {
                    let map = {}, sAll = 0, pAll = 0;
                    res.data.forEach(r => {
                        let n = r['客戶名稱'] || '未分類', s = parseFloat(r['本幣未稅金額']?.replace(/,/g,'')) || 0, p = parseFloat(r['毛利']?.replace(/,/g,'')) || 0;
                        if(!map[n]) map[n] = {s:0, p:0};
                        map[n].s += s; map[n].p += p;
                        sAll += s; pAll += p;
                    });

                    document.getElementById('sales').innerText = Math.round(sAll).toLocaleString();
                    document.getElementById('profit').innerText = Math.round(pAll).toLocaleString();
                    
                    let sorted = Object.keys(map).map(n => ({n, ...map[n]})).sort((a,b) => b.s - a.s);
                    document.getElementById('body-rank').innerHTML = sorted.map((c, i) => 
                        `<tr><td>${i+1}</td><td>${c.n}</td><td>${Math.round(c.s).toLocaleString()}</td><td>${Math.round(c.p).toLocaleString()}</td><td>${c.s>0?((c.p/c.s)*100).toFixed(0)+'%':'0%'}</td></tr>`
                    ).join('');
                    
                    let target = parseFloat(document.getElementById('m-target').value.replace(/,/g,'')) * 12;
                    document.getElementById('a-target').innerText = target.toLocaleString();
                    document.getElementById('summary').innerText = `達成率：${(sAll/target*100).toFixed(1)}% | 毛利率：${sAll>0?((pAll/sAll)*100).toFixed(1):0}% | 費用率：${sAll>0?((parseFloat(document.getElementById('expense').value.replace(/,/g,''))/sAll)*100).toFixed(1):0}%`;
                }
            });
        }
        document.getElementById('d').innerText = new Date().toLocaleDateString();
        fetchCSVData();
    </script>
</body>
</html>
