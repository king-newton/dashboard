<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>金牛頓 2026 營運分析儀表板</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; padding: 10px; background-color: #f4f4f4; color: #333; margin: 0; }
        
        .tabs { display: flex; margin-bottom: 15px; }
        .tab-button { padding: 12px 10px; cursor: pointer; background: #ddd; border: none; font-size: 15px; flex: 1; transition: 0.3s; }
        .tab-button.active { background: #3e5a26; color: white; }
        .tab-content { display: none; background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .tab-content.active { display: block; }
        
        /* 強制表頭不換行 */
        .report-title { 
            font-size: 20px; font-weight: bold; margin-bottom: 20px; text-align: center; color: #1a1a1a; 
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        
        table { width: 100%; border-collapse: collapse; }
        td { border: 1px solid #ddd; padding: 12px; font-size: 15px; }
        .label { background-color: #f9f9f9; color: #555; font-weight: bold; }
        .value { text-align: right; font-family: "Consolas", monospace; }
        
        /* 手機版統一靠左 */
        @media screen and (max-width: 600px) {
            .label, .value { display: block; width: 100%; text-align: left; border: none; padding-bottom: 0; }
            td { display: block; border: none; border-bottom: 1px solid #eee; }
            .value { padding-top: 2px; padding-bottom: 15px; color: #333; font-weight: bold; }
        }

        input { 
            width: 100%; text-align: left; border: none; font-size: 15px; 
            font-family: "Consolas", monospace; background: transparent; padding: 0;
        }
        input:focus { outline: none; background: #fff; }

        .footer-bar { 
            background-color: #3e5a26; color: white; padding: 15px; 
            text-align: center; margin-top: 20px; border-radius: 5px; font-size: 14px; line-height: 1.6;
        }
        .highlight-red { color: #d9534f; }
        .highlight-green { color: #28a745; }
    </style>
</head>
<body>

    <div class="tabs">
        <button class="tab-button active" onclick="openTab(event, 'DASHBOARD')">DASHBOARD</button>
        <button class="tab-button" onclick="openTab(event, 'DATA')">資料明細</button>
    </div>

    <div id="DASHBOARD" class="tab-content active">
        <div class="report-title">2026 年度累計營收銷售分析報告</div>
        
        <table>
            <tr><td class="label">日期時間</td><td class="value" id="current-date">--</td></tr>
            <tr><td class="label">今日進度</td><td class="value" id="day-of-year">--</td></tr>
            <tr>
                <td class="label">2026年每月目標</td>
                <td class="value"><input type="text" id="monthly-target" value="7,500,000" onfocus="this.value=this.value.replace(/,/g,'')" onblur="formatCommas(this); calculateLogic()"></td>
            </tr>
            <tr><td class="label">2026年營收目標</td><td class="value" id="annual-target">NT$ 90,000,000</td></tr>
            <tr><td class="label">目前銷貨合計</td><td class="value" id="total-sales">讀取中...</td></tr>
            <tr><td class="label" id="diff-label">進度落後/超前</td><td class="value" id="progress-status">計算中...</td></tr>
            <tr><td class="label">目前銷貨利潤合計</td><td class="value" id="total-profit">讀取中...</td></tr>
            <tr>
                <td class="label">營業費用總計</td>
                <td class="value"><input type="text" id="expense-input" value="3,460,401" onfocus="this.value=this.value.replace(/,/g,'')" onblur="formatCommas(this); calculateLogic()"></td>
            </tr>
        </table>

        <div class="footer-bar" id="summary-bar">
            達成率：--% | 毛利率：--% | 費用率：--%
        </div>
    </div>

    <div id="DATA" class="tab-content">
        <iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vQWoViZ8oexk0ZDVaXPcbxplYRiadGzvcF0nM_dI0iSpVQUqCpgJeCFCIfWKX60De_YcN_xmkreBZUx/pubhtml?widget=true&amp;headers=false" style="width:100%; height:700px; border:none;"></iframe>
    </div>

    <script>
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQWoViZ8oexk0ZDVaXPcbxplYRiadGzvcF0nM_dI0iSpVQUqCpgJeCFCIfWKX60De_YcN_xmkreBZUx/pub?gid=0&single=true&output=csv";
        
        function fetchCSVData() {
            Papa.parse(CSV_URL, {
                download: true, header: true, skipEmptyLines: true,
                complete: function(results) {
                    let s = results.data.reduce((sum, row) => sum + (parseFloat(row['本幣未稅金額']?.toString().replace(/,/g, '')) || 0), 0);
                    let p = results.data.reduce((sum, row) => sum + (parseFloat(row['毛利']?.toString().replace(/,/g, '')) || 0), 0);
                    document.getElementById('total-sales').innerText = 'NT$ ' + Math.round(s).toLocaleString();
                    document.getElementById('total-profit').innerText = 'NT$ ' + Math.round(p).toLocaleString();
                    calculateLogic(s, p);
                }
            });
        }

        function calculateLogic(s, p) {
            if(s === undefined) { s = parseFloat(document.getElementById('total-sales').innerText.replace(/[NT$,]/g, '')); }
            if(p === undefined) { p = parseFloat(document.getElementById('total-profit').innerText.replace(/[NT$,]/g, '')); }
            
            const now = new Date();
            const dayOfYear = Math.floor((now - new Date(now.getFullYear(), 0, 0)) / 86400000);
            let monthly = parseFloat(document.getElementById('monthly-target').value.replace(/,/g, '')) || 0;
            let annual = monthly * 12;
            document.getElementById('annual-target').innerText = 'NT$ ' + annual.toLocaleString();

            let diff = s - ((annual / 365) * dayOfYear);
            let progEl = document.getElementById('progress-status');
            progEl.innerText = 'NT$ ' + Math.round(diff).toLocaleString();
            progEl.className = diff >= 0 ? 'value highlight-green' : 'value highlight-red';
            document.getElementById('diff-label').innerText = diff >= 0 ? '進度超前' : '進度落後';

            let exp = parseFloat(document.getElementById('expense-input').value.replace(/,/g, '')) || 0;
            document.getElementById('summary-bar').innerText = `達成率：${annual > 0 ? (s/annual*100).toFixed(1) : 0}% | 毛利率：${s > 0 ? (p/s*100).toFixed(1) : 0}% | 費用率：${s > 0 ? (exp/s*100).toFixed(1) : 0}%`;
        }

        function formatCommas(i) { let v = parseFloat(i.value.replace(/,/g, '')); if(!isNaN(v)) i.value = v.toLocaleString(); }
        function openTab(e, n) {
            document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
            document.querySelectorAll('.tab-button').forEach(el => el.className = el.className.replace(" active", ""));
            document.getElementById(n).style.display = 'block';
            e.currentTarget.className += " active";
        }

        window.onload = () => {
            document.getElementById('current-date').innerText = new Date().toLocaleDateString();
            document.getElementById('day-of-year').innerText = new Date().getFullYear() + '年第' + Math.floor((new Date() - new Date(new Date().getFullYear(), 0, 0)) / 86400000) + '天';
            fetchCSVData();
        };
    </script>
</body>
</html>
