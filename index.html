<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>金牛頓 2026 營運分析儀表板</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; padding: 20px; background-color: #f4f4f4; color: #333; margin: 0; }
        .tabs { display: flex; margin-bottom: 20px; }
        .tab-button { padding: 12px 24px; cursor: pointer; background: #ddd; border: none; font-size: 16px; flex: 1; }
        .tab-button.active { background: #3e5a26; color: white; }
        .tab-content { display: none; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .tab-content.active { display: block; }
        
        .report-title { font-size: 24px; font-weight: bold; margin-bottom: 20px; text-align: center; }
        
        /* 表格容器，處理手機滾動 */
        .table-container { width: 100%; overflow-x: auto; margin-bottom: 25px; }
        table { width: 100%; border-collapse: collapse; min-width: 500px; }
        td, th { border: 1px solid #ddd; padding: 12px; font-size: 15px; }
        
        /* 總表專用樣式 */
        .main-table .label { background-color: #f9f9f9; font-weight: bold; width: 25%; }
        .main-table .value { width: 25%; text-align: right; font-family: "Consolas", monospace; }
        
        /* 統計表專用樣式 */
        .stat-table th { background-color: #3e5a26; color: white; text-align: center; }
        .stat-table td { text-align: right; }
        .stat-table td:nth-child(2) { text-align: left; }
        .stat-table td:first-child { text-align: center; }
        
        .footer-bar { background-color: #3e5a26; color: white; padding: 15px; text-align: center; border-radius: 5px; font-size: 15px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="tabs">
        <button class="tab-button active" onclick="openTab(event, 'DASHBOARD')">DASHBOARD</button>
        <button class="tab-button" onclick="openTab(event, 'DATA')">資料明細</button>
    </div>

    <div id="DASHBOARD" class="tab-content active">
        <div class="report-title">2026 年度營運分析報表</div>
        
        <div class="table-container">
            <table class="main-table">
                <tr><td class="label">日期時間</td><td class="value" id="current-date">--</td><td class="label">今日進度</td><td class="value" id="day-of-year">--</td></tr>
                <tr><td class="label">每月目標</td><td class="value" id="monthly-target-display">7,500,000</td><td class="label">營收目標</td><td class="value" id="annual-target">90,000,000</td></tr>
                <tr><td class="label">銷貨合計</td><td class="value" id="total-sales">--</td><td class="label">利潤合計</td><td class="value" id="total-profit">--</td></tr>
            </table>
        </div>
        
        <div class="footer-bar" id="summary-bar">達成率：--% | 毛利率：--%</div>
        
        <div class="report-title" style="font-size: 18px;">客戶銷售排名</div>
        <div class="table-container">
            <table class="stat-table">
                <thead><tr><th>排名</th><th>客戶名稱</th><th>銷貨合計</th><th>利潤合計</th><th>毛利率</th></tr></thead>
                <tbody id="client-stats-body"></tbody>
            </table>
        </div>
    </div>

    <div id="DATA" class="tab-content">
        <iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vQWoViZ8oexk0ZDVaXPcbxplYRiadGzvcF0nM_dI0iSpVQUqCpgJeCFCIfWKX60De_YcN_xmkreBZUx/pubhtml?widget=true&amp;headers=false" style="width:100%; height:700px; border:none;"></iframe>
    </div>

    <script>
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQWoViZ8oexk0ZDVaXPcbxplYRiadGzvcF0nM_dI0iSpVQUqCpgJeCFCIfWKX60De_YcN_xmkreBZUx/pub?gid=0&single=true&output=csv";
        
        function fetchCSVData() {
            Papa.parse(CSV_URL, {
                download: true, header: true, skipEmptyLines: true,
                complete: function(results) {
                    let clientMap = {}, totalS = 0, totalP = 0;
                    results.data.forEach(row => {
                        let name = row['客戶名稱'] || '未分類';
                        let s = parseFloat(row['本幣未稅金額']?.replace(/,/g, '')) || 0;
                        let p = parseFloat(row['毛利']?.replace(/,/g, '')) || 0;
                        if(!clientMap[name]) clientMap[name] = { s: 0, p: 0 };
                        clientMap[name].s += s; clientMap[name].p += p;
                        totalS += s; totalP += p;
                    });

                    document.getElementById('total-sales').innerText = 'NT$ ' + Math.round(totalS).toLocaleString();
                    document.getElementById('total-profit').innerText = 'NT$ ' + Math.round(totalP).toLocaleString();
                    document.getElementById('current-date').innerText = new Date().toLocaleDateString();
                    document.getElementById('day-of-year').innerText = '第 ' + Math.floor((new Date() - new Date(new Date().getFullYear(), 0, 0)) / 86400000) + ' 天';

                    let sorted = Object.keys(clientMap).map(n => ({name: n, s: clientMap[n].s, p: clientMap[n].p})).sort((a, b) => b.s - a.s);
                    let html = '';
                    sorted.forEach((c, index) => {
                        let m = c.s > 0 ? (c.p / c.s * 100).toFixed(0) + '%' : '0%';
                        html += `<tr><td>${index + 1}</td><td>${c.name}</td><td>${Math.round(c.s).toLocaleString()}</td><td>${Math.round(c.p).toLocaleString()}</td><td>${m}</td></tr>`;
                    });
                    document.getElementById('client-stats-body').innerHTML = html;
                    document.getElementById('summary-bar').innerText = `達成率：${(totalS / 90000000 * 100).toFixed(1)}% | 毛利率：${totalS > 0 ? (totalP / totalS * 100).toFixed(1) : 0}%`;
                }
            });
        }
        function openTab(e, n) {
            document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
            document.querySelectorAll('.tab-button').forEach(el => el.className = el.className.replace(" active", ""));
            document.getElementById(n).style.display = 'block';
            e.currentTarget.className += " active";
        }
        window.onload = fetchCSVData;
    </script>
</body>
</html>
